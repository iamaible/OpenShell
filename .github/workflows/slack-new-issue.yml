name: "Slack: New Issue Alert"

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  issues: read

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'NVIDIA'
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_COMMUNITY_WH }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TITLE="[Smoke Test] Example issue title"
            AUTHOR="${{ github.actor }}"
            URL="https://github.com/$REPO/actions/runs/$RUN_ID"
            NUMBER="0"
            LABELS="test"
          else
            TITLE=$(echo "${{ github.event.issue.title }}" | head -c 150)
            AUTHOR="${{ github.event.issue.user.login }}"
            URL="${{ github.event.issue.html_url }}"
            NUMBER="${{ github.event.issue.number }}"
            LABELS=$(echo '${{ toJSON(github.event.issue.labels.*.name) }}' \
              | jq -r 'if length > 0 then join(", ") else "none" end')
          fi

          curl -sf "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg title "$TITLE" \
              --arg author "$AUTHOR" \
              --arg url "$URL" \
              --arg number "$NUMBER" \
              --arg labels "$LABELS" \
              '{
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: ("*New Issue #" + $number + "*\n<" + $url + "|" + $title + ">")
                    }
                  },
                  {
                    type: "context",
                    elements: [
                      {
                        type: "mrkdwn",
                        text: ("*Author:* " + $author + "  |  *Labels:* " + $labels)
                      }
                    ]
                  }
                ]
              }'
            )"
