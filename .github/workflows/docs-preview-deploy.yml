name: Docs PR Preview Deploy

# Runs after the build workflow completes. Uses workflow_run so the
# GITHUB_TOKEN has write access to the base repo — this is the standard
# pattern for deploying from fork PRs where the pull_request token is
# read-only.
on:
    workflow_run:
        workflows: ["Docs PR Preview Build"]
        types: [completed]

concurrency:
    group: preview-deploy-${{ github.event.workflow_run.head_branch }}
    cancel-in-progress: true

permissions:
    contents: write
    pull-requests: write
    actions: read

jobs:
    deploy:
        runs-on: ubuntu-latest
        if: github.event.workflow_run.conclusion == 'success'
        steps:
            - name: Download PR metadata
              uses: actions/download-artifact@v4
              with:
                  name: pr-metadata
                  path: pr-metadata/
                  run-id: ${{ github.event.workflow_run.id }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Read PR metadata
              id: metadata
              run: |
                  echo "pr-number=$(cat pr-metadata/pr-number)" >> "$GITHUB_OUTPUT"
                  event_action="$(cat pr-metadata/event-action)"
                  echo "event-action=$event_action" >> "$GITHUB_OUTPUT"
                  if [[ "$event_action" == "closed" ]]; then
                    echo "action=remove" >> "$GITHUB_OUTPUT"
                  else
                    echo "action=deploy" >> "$GITHUB_OUTPUT"
                  fi

            - name: Download docs artifact
              if: steps.metadata.outputs.action == 'deploy'
              uses: actions/download-artifact@v4
              with:
                  name: docs-preview
                  path: docs-preview/
                  run-id: ${{ github.event.workflow_run.id }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Deploy preview
              if: steps.metadata.outputs.action == 'deploy'
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  branch: gh-pages
                  folder: docs-preview/
                  target-folder: pr-preview/pr-${{ steps.metadata.outputs.pr-number }}
                  commit-message: "Deploy preview for PR ${{ steps.metadata.outputs.pr-number }}"
                  clean: true

            - name: Remove preview
              if: steps.metadata.outputs.action == 'remove'
              run: |
                  git fetch origin gh-pages
                  git worktree add gh-pages-branch origin/gh-pages
                  cd gh-pages-branch
                  PREVIEW_DIR="pr-preview/pr-${{ steps.metadata.outputs.pr-number }}"
                  if [ -d "$PREVIEW_DIR" ]; then
                    git rm -rf "$PREVIEW_DIR"
                    git commit -m "Remove preview for PR ${{ steps.metadata.outputs.pr-number }}"
                    git push origin gh-pages
                  else
                    echo "Preview directory $PREVIEW_DIR does not exist, nothing to remove."
                  fi

            - name: Comment on PR
              uses: actions/github-script@v7
              with:
                  script: |
                      const prNumber = parseInt('${{ steps.metadata.outputs.pr-number }}');
                      const action = '${{ steps.metadata.outputs.action }}';
                      const marker = '<!-- docs-preview-comment -->';
                      const repo = context.repo;

                      // Find existing preview comment
                      const comments = await github.rest.issues.listComments({
                        ...repo,
                        issue_number: prNumber,
                        per_page: 100,
                      });
                      const existing = comments.data.find(c => c.body.includes(marker));

                      let body;
                      if (action === 'deploy') {
                        const url = `https://${repo.owner}.github.io/${repo.repo}/pr-preview/pr-${prNumber}/`;
                        body = `${marker}\n### Docs Preview\n\nPreview deployed to ${url}`;
                      } else {
                        body = `${marker}\n### Docs Preview\n\nPreview removed.`;
                      }

                      if (existing) {
                        await github.rest.issues.updateComment({
                          ...repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          ...repo,
                          issue_number: prNumber,
                          body,
                        });
                      }
