name: Docs PR Preview Build

on:
    pull_request:
        branches: [main]
        types: [opened, reopened, synchronize, closed]
        paths:
            - "docs/**"

concurrency:
    group: preview-${{ github.ref }}
    cancel-in-progress: true

permissions:
    packages: read

defaults:
    run:
        shell: bash

env:
    MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
    build:
        runs-on: build-arm64
        container:
            image: ghcr.io/nvidia/openshell/ci:latest
            credentials:
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install tools
              if: github.event.action != 'closed'
              run: mise install

            - name: Build documentation
              if: github.event.action != 'closed'
              run: mise run docs:build:strict

            - name: Delete unnecessary files
              if: github.event.action != 'closed'
              run: |
                  find _build -name .doctrees -prune -exec rm -rf {} \;
                  find _build -name .buildinfo -exec rm {} \;

            - name: Upload docs artifact
              if: github.event.action != 'closed'
              uses: actions/upload-artifact@v4
              with:
                  name: docs-preview
                  path: _build/docs/
                  retention-days: 1

            - name: Save PR metadata
              run: |
                  mkdir -p pr-metadata
                  echo "${{ github.event.number }}" > pr-metadata/pr-number
                  echo "${{ github.event.action }}" > pr-metadata/event-action

            - name: Upload PR metadata
              uses: actions/upload-artifact@v4
              with:
                  name: pr-metadata
                  path: pr-metadata/
                  retention-days: 1
